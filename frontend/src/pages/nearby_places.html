<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Yakındaki Mekanlar</title>
    <!-- LEAFLET -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <style>
       *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{

    background:#0f172a;

    color:white;

    padding:30px;

    overflow-x:hidden;

    background-image:
    radial-gradient(circle at top left,#2563eb33,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed33,transparent 25%);
}


/* CONTAINER */

.container{

    max-width:1400px;

    margin:auto;
}


/* TOPBAR */

.topbar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:20px;

    margin-bottom:30px;

    flex-wrap:wrap;
}


/* TITLE */

.title{

    font-size:50px;

    font-weight:800;

    background:linear-gradient(to right,#60a5fa,#c084fc);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}


/* BACK BUTTON */

.back-btn{

    padding:14px 22px;

    border-radius:16px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    color:white;

    text-decoration:none;

    font-weight:700;

    border:1px solid rgba(255,255,255,0.08);

    transition:0.3s;
}

.back-btn:hover{

    transform:translateY(-4px);

    background:#2563eb;
}


/* MAP */

#map{

    width:100%;

    height:520px;

    border-radius:28px;

    overflow:hidden;

    margin-bottom:40px;

    box-shadow:0 15px 40px rgba(0,0,0,0.35);

    border:1px solid rgba(255,255,255,0.08);
}


/* CATEGORY */

.categories{

    display:flex;

    gap:12px;

    overflow-x:auto;

    padding-bottom:10px;
}


/* CATEGORY BUTTON */

.category-btn{

    border:none;

    padding:13px 22px;

    border-radius:999px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    color:white;

    cursor:pointer;

    font-weight:700;

    white-space:nowrap;

    transition:0.3s;
}

.category-btn:hover{

    background:#2563eb;

    transform:translateY(-3px);
}


/* ACTIVE */

.category-btn.active{

    background:linear-gradient(to right,#2563eb,#7c3aed);

    color:white;
}


/* GRID */

.places-grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(330px,1fr));

    gap:30px;
}


/* CARD */

.card{

    background:rgba(255,255,255,0.08);

    border-radius:28px;

    overflow:hidden;

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.08);

    transition:0.4s;

    cursor:pointer;
}

.card:hover{

    transform:translateY(-10px);

    box-shadow:0 20px 40px rgba(0,0,0,0.35);
}


/* IMAGE */

.card-image{

    width:100%;

    height:240px;

    object-fit:cover;
}


/* BODY */

.card-body{

    padding:24px;
}


/* TITLE */

.card-title{

    font-size:28px;

    font-weight:800;

    margin-bottom:14px;

    color:white;
}


/* DESCRIPTION */

.card-description{

    color:#cbd5e1;

    line-height:1.7;

    margin-bottom:16px;
}


/* INFO */

.card-info{

    margin-bottom:10px;

    font-size:15px;

    color:#e2e8f0;
}


/* LOADING */

.loading{

    text-align:center;

    margin-top:80px;

    font-size:26px;

    color:#cbd5e1;
}


/* RESPONSIVE */

@media(max-width:768px){

    .title{

        font-size:38px;
    }

    .topbar{

        flex-direction:column;

        align-items:flex-start;
    }

    #map{

        height:400px;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div id="categories" class="categories"></div>
            <h1 class="title">
                Yakındaki Mekanlar
            </h1>
            <a href="./main_page.html" class="back-btn">
                Ana Sayfa
            </a>
        </div>
        <div id="map"></div>

        <div
            id="placesGrid"
            class="places-grid"
        ></div>

    </div>

    <script type="module">
        import {
            getNearbyPlaces,
            getNearbyPlacesByCategory,
            getCategories
        } from "../scripts/api.js";
        const placesGrid = document.getElementById("placesGrid");
        let map;
        const categoriesContainer = document.getElementById("categories");

        let currentLat = null;
        let currentLng = null;

        /* =========================
           INITIALIZE MAP
        ========================= */

        function initializeMap(lat, lng) {
            map = L.map("map").setView(
                [lat, lng],
                13
            );
            L.tileLayer(
                "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
                {
                    attribution:
                        "&copy; OpenStreetMap contributors"
                }
            ).addTo(map);
            /* USER MARKER */
            L.marker([lat, lng])
                .addTo(map)
                .bindPopup("Sizin Konumunuz")
                .openPopup();
        }

        /* =========================
           RENDER PLACES
        ========================= */

        function renderPlaces(places) {
            placesGrid.innerHTML = "";
            if (!places.length) {
                placesGrid.innerHTML = `
                    <h2>
                        Yakında mekan bulunamadı
                    </h2>
                `;
                return;
            }
            places.forEach(place => {

                /* MAP MARKER */

                L.marker([
                    place.latitude,
                    place.longitude
                ]).addTo(map).bindPopup(place.title);

                /* CARD */

                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <img
                        src="http://127.0.0.1:8000/${place.image_path}" class="card-image" alt="${place.title}"/>
                    <div class="card-body">
                        <h2 class="card-title">
                            ${place.title}
                        </h2>
                        <p class="card-description">
                            ${place.description}
                        </p>
                        <p class="card-info">
                            <strong>Adres:</strong>
                            ${place.address}
                        </p>
                        <p class="card-info">
                            <strong>Fiyat:</strong>
                            ${place.price}
                        </p>
                    </div>
                `;
                card.addEventListener("click", () => {
                    window.location.href =
                        `place.html?id=${place.id}`;
                });
                placesGrid.appendChild(card);
            });
        }

        /* =========================
           LOAD NEARBY PLACES
        ========================= */

        async function loadNearbyPlaces() {
            navigator.geolocation.getCurrentPosition(
                async (position) => {

                    try {
                        currentLat = position.coords.latitude;
                        currentLng = position.coords.longitude;
                        initializeMap(
                            currentLat,
                            currentLng
                        );
                        await loadCategories();
                        const places =
                            await getNearbyPlaces(
                                currentLat,
                                currentLng
                            );

                        renderPlaces(places);
                    } catch (error) {
                        console.error(error);
                        placesGrid.innerHTML = `
                            <h2>
                                Mekanlar yüklenemedi
                            </h2>
                        `;
                    }
                },
                (error) => {
                    console.error(error);
                    placesGrid.innerHTML = `
                        <h2>
                            Konum erişimi reddedildi
                        </h2>
                    `;
                }
            );
        }
        /* =========================
        LOAD CATEGORIES
        ========================= */

        async function loadCategories() {

            try {

                const categories =
                    await getCategories();

                categoriesContainer.innerHTML = "";

                /* ALL BUTTON */

                const allButton =
                    document.createElement("button");

                allButton.className =
                    "category-btn active";

                allButton.textContent = "Tümü";

                allButton.addEventListener(
                    "click",
                    async () => {

                        setActiveCategory(allButton);

                        const places =
                            await getNearbyPlaces(
                                currentLat,
                                currentLng
                            );

                        renderPlaces(places);
                    }
                );

                categoriesContainer.appendChild(allButton);

                /* CATEGORY BUTTONS */

                categories.forEach(category => {

                    const button =
                        document.createElement("button");

                    button.className = "category-btn";

                    button.textContent =
                        category.title;

                    button.addEventListener(
                        "click",
                        async () => {

                            try {

                                setActiveCategory(button);

                                const places =
                                    await getNearbyPlacesByCategory(
                                        category.id,
                                        currentLat,
                                        currentLng
                                    );

                                renderPlaces(places);

                            } catch (error) {

                                console.error(error);
                            }
                        }
                    );

                    categoriesContainer.appendChild(button);
                });

            } catch (error) {

                console.error(error);
            }
        }

        /* =========================
        ACTIVE CATEGORY
        ========================= */

        function setActiveCategory(activeButton) {

            const buttons =
                document.querySelectorAll(
                    ".category-btn"
                );

            buttons.forEach(button => {
                button.classList.remove("active");
            });

            activeButton.classList.add("active");
        }
        
        loadNearbyPlaces();
    </script>
</body>
</html>
