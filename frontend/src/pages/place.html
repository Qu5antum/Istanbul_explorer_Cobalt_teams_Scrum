<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mekan Detayı</title>
    <!-- LEAFLET -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!-- ROUTING -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{

    background:#0f172a;

    color:white;

    padding:40px;

    overflow-x:hidden;

    background-image:
    radial-gradient(circle at top left,#2563eb33,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed33,transparent 25%);
}


/* CONTAINER */

.container{

    max-width:1200px;

    margin:auto;
}


/* BACK BUTTON */

.back-btn{

    display:inline-block;

    margin-bottom:30px;

    padding:14px 22px;

    border-radius:16px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    color:white;

    text-decoration:none;

    font-weight:700;

    border:1px solid rgba(255,255,255,0.08);

    transition:0.3s;
}

.back-btn:hover{

    transform:translateY(-4px);

    background:#2563eb;
}


/* CARD */

.card{

    background:rgba(255,255,255,0.08);

    border-radius:30px;

    overflow:hidden;

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:0 20px 40px rgba(0,0,0,0.35);
}


/* IMAGE */

.image{

    width:100%;

    height:520px;

    object-fit:cover;
}


/* CONTENT */

.content{

    padding:35px;
}


/* TITLE */

.title{

    font-size:52px;

    font-weight:800;

    margin-bottom:24px;

    background:linear-gradient(to right,#60a5fa,#c084fc);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}


/* DESCRIPTION */

.description{

    color:#cbd5e1;

    line-height:1.8;

    margin-bottom:28px;

    font-size:18px;
}


/* INFO */

.info{

    margin-bottom:14px;

    font-size:17px;

    color:#e2e8f0;
}


/* BUTTONS */

.action-buttons{

    display:flex;

    gap:14px;

    margin-top:30px;

    flex-wrap:wrap;
}


/* MAP BUTTON */

.map-btn{

    display:inline-block;

    padding:15px 22px;

    border-radius:16px;

    background:linear-gradient(to right,#2563eb,#7c3aed);

    color:white;

    text-decoration:none;

    font-weight:700;

    transition:0.3s;
}

.map-btn:hover{

    transform:translateY(-4px);
}


/* FAVORITE */

.favorite-btn{

    padding:15px 22px;

    border:none;

    border-radius:16px;

    background:#ef4444;

    color:white;

    cursor:pointer;

    font-weight:700;

    transition:0.3s;
}

.favorite-btn:hover{

    background:#dc2626;

    transform:translateY(-4px);
}


/* MAP */

#map{

    width:100%;

    height:520px;

    margin-top:35px;

    border-radius:30px;

    overflow:hidden;

    box-shadow:0 20px 40px rgba(0,0,0,0.35);

    border:1px solid rgba(255,255,255,0.08);
}


/* COMMENTS */

.comments-section{

    margin-top:50px;
}


/* COMMENTS TITLE */

.comments-title{

    font-size:36px;

    margin-bottom:24px;

    font-weight:800;
}


/* FORM */

.comment-form{

    display:flex;

    gap:14px;

    margin-bottom:30px;

    flex-wrap:wrap;
}


/* INPUT */

.comment-input{

    flex:1;

    padding:16px;

    border:none;

    border-radius:18px;

    outline:none;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    color:white;

    font-size:16px;

    border:1px solid rgba(255,255,255,0.08);
}

.comment-input::placeholder{

    color:#cbd5e1;
}


/* BUTTON */

.comment-btn{

    padding:16px 24px;

    border:none;

    border-radius:18px;

    background:linear-gradient(to right,#2563eb,#7c3aed);

    color:white;

    cursor:pointer;

    font-weight:700;

    transition:0.3s;
}

.comment-btn:hover{

    transform:translateY(-4px);
}


/* COMMENT LIST */

.comments-list{

    display:flex;

    flex-direction:column;

    gap:18px;
}


/* COMMENT CARD */

.comment-card{

    background:rgba(255,255,255,0.08);

    padding:24px;

    border-radius:20px;

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.08);
}


/* COMMENT TEXT */

.comment-text{

    font-size:17px;

    margin-bottom:12px;

    line-height:1.6;

    color:white;
}


/* META */

.comment-meta{

    color:#94a3b8;

    font-size:14px;
}


/* RESPONSIVE */

@media(max-width:768px){

    body{

        padding:20px;
    }

    .title{

        font-size:38px;
    }

    .image{

        height:320px;
    }

    #map{

        height:350px;
    }

    .action-buttons{

        flex-direction:column;
    }

    .comment-form{

        flex-direction:column;
    }

    .map-btn,
    .favorite-btn,
    .comment-btn{

        width:100%;
    }
}
    </style>
</head>

<body>
    <div class="container">
        <a href="./main_page.html" class="back-btn">
            Geri Dön
        </a>
        <div id="placeDetail"></div>
        <div id="map"></div>
        <div class="comments-section">
            <h2 class="comments-title">
                Yorumlar
            </h2>
            <div class="comment-form">

                <input type="text" id="commentInput" class="comment-input" placeholder="Yorum yaz..."/>
                <button id="commentBtn" class="comment-btn">
                    Gönder
                </button>
            </div>
            <div id="commentsList" class="comments-list"></div>
        </div>
    </div>

    <script type="module">
        import { getPlaceById, getPlaceComments, createComment, addPlaceToFavorites} from "../scripts/api.js";
        const container = document.getElementById("placeDetail");
        const params = new URLSearchParams(window.location.search);
        const placeId = params.get("id");
        const commentsList = document.getElementById("commentsList");
        const commentInput = document.getElementById("commentInput");
        const commentBtn = document.getElementById("commentBtn");
        /* =========================
        CREATE COMMENT
        ========================= */
        commentBtn.addEventListener("click", async () => {
            const text = commentInput.value.trim();
            if (!text) {
                return;
            }
            try {
                await createComment(placeId, text);
                commentInput.value = "";
                loadComments();
            } catch (error) {
                console.error(error);
                alert("Yorum eklenemedi");
            }
        });

        /* =========================
        LOAD COMMENTS
        ========================= */
        async function loadComments() {
            try {
                const comments = await getPlaceComments(placeId);
                commentsList.innerHTML = "";
                if (!comments.length) {
                    commentsList.innerHTML = `
                        <p>Henüz yorum yok</p>
                    `;
                    return;
                }
                comments.forEach(comment => {
                    const commentCard = document.createElement("div");
                    commentCard.className =
                        "comment-card";
                    commentCard.innerHTML = `
                        <div class="comment-header">
                            <p class="comment-user">
                                @${comment.user.email}
                            </p>
                            <p class="comment-meta">
                                ${new Date(
                                    comment.created_at
                                ).toLocaleString()}
                            </p>
                        </div>
                        <p class="comment-text">
                            ${comment.title}
                        </p>
                    `;
                    commentsList.appendChild(commentCard);
                });
            } catch (error) {
                console.error(error);
            }
        }
        async function loadPlaceDetail() {
            try {
                const place = await getPlaceById(placeId);
                container.innerHTML = `
                    <div class="card">
                        <img src="http://127.0.0.1:8000/${place.image_path}" class="image" alt="${place.title}"/>
                        <div class="content">
                            <h1 class="title">
                                ${place.title}
                            </h1>
                            <p class="description">
                                ${place.description}
                            </p>
                            <p class="info">
                                <strong>Adres:</strong>
                                ${place.address}
                            </p>
                            <p class="info">
                                <strong>Fiyat:</strong>
                                ${place.price}
                            </p>
                            <p class="info">
                                <strong>Latitude:</strong>
                                ${place.latitude}
                            </p>
                            <p class="info">
                                <strong>Longitude:</strong>
                                ${place.longitude}
                            </p>
                            <p class="card-info">
                                <strong>Mesafe:</strong>
                                ${
                                    place.distance
                                        ? formatDistance(place.distance)
                                        : "Bilinmiyor"
                                }
                            </p>
                            <p class="info">
                                <strong>Eklenme Tarihi:</strong>
                                ${new Date(place.created_at).toLocaleString()}
                            </p>
                            <div class="action-buttons">
                                <a href="${place.link}" target="_blank" class="map-btn">
                                    Google Maps Aç
                                </a>
                                <button class="favorite-btn" id="favoriteBtn">
                                    ❤️ Favorilere Ekle
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                initializeMap(place);
                const favoriteBtn = document.getElementById("favoriteBtn");

                favoriteBtn.addEventListener("click", async () => {
                    try {
                        await addPlaceToFavorites(placeId);
                        favoriteBtn.innerHTML = "Favorilere Kaydedildi";
                        favoriteBtn.disabled = true;
                    } catch (error) {
                        console.error(error);
                        alert("Favorilere eklenemedi");
                    }
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <h2>Mekan yüklenemedi</h2>
                `;
            }
        }
        /* =========================
           MAP
        ========================= */

        function initializeMap(place) {
            const destinationLat = place.latitude;
            const destinationLng = place.longitude;
            const map = L.map("map").setView(
                [destinationLat, destinationLng],
                14
            );
            L.tileLayer(
                "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
                {
                    attribution: "&copy; OpenStreetMap contributors"
                }
            ).addTo(map);
            /* PLACE MARKER */
            L.marker([destinationLat, destinationLng]).addTo(map).bindPopup(place.title).openPopup();

            /* USER LOCATION */

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const userLat = position.coords.latitude;
                    const userLng = position.coords.longitude;
                    /* USER MARKER */
                    L.marker([userLat, userLng]).addTo(map).bindPopup("Sizin Konumunuz");
                    /* ROUTE */
                    L.Routing.control({
                        waypoints: [
                            L.latLng(userLat, userLng),
                            L.latLng(destinationLat, destinationLng)
                        ],
                        routeWhileDragging: false,
                        show: false,
                        addWaypoints: false,
                        draggableWaypoints: false,
                        fitSelectedRoutes: true
                    }).addTo(map);
                },
                (error) => {
                    console.error("Konum alınamadı:", error);
                }
            );
        }
        function formatDistance(distance) {

            if (!distance && distance !== 0) {
                return "Bilinmiyor";
            }

            if (distance < 1) {

                return `${Math.round(distance * 1000)} m`;
            }

            return `${distance.toFixed(1)} km`;
        }
        loadPlaceDetail();
        loadComments();
    </script>
</body>
</html>
