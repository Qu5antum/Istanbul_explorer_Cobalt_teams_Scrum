<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mekanlar</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{

    background:#0f172a;

    color:white;

    padding:30px;

    overflow-x:hidden;

    background-image:
    radial-gradient(circle at top left,#2563eb33,transparent 25%),
    radial-gradient(circle at bottom right,#7c3aed33,transparent 25%);
}


/* CONTAINER */

.container{

    max-width:1400px;

    margin:auto;
}


/* TITLE */

.title{

    font-size:52px;

    font-weight:800;

    background:linear-gradient(to right,#60a5fa,#c084fc);

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;
}


.topbar-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    gap:15px;

    flex-wrap:wrap;
}


/* RIGHT SIDE */

.header-actions{

    display:flex;

    gap:15px;

    align-items:center;
}


.topbar{

    display:flex;

    align-items:center;

    gap:14px;

    margin-bottom:35px;
}


/* SEARCH INPUT */

.search-input{

    flex:1;

    height:54px;

    padding:0 22px;

    border:none;

    border-radius:16px;

    outline:none;

    font-size:16px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    color:white;

    border:1px solid rgba(255,255,255,0.08);

    transition:0.3s;
}

.search-input:focus{

    border:1px solid #60a5fa;

    box-shadow:0 0 15px rgba(96,165,250,0.35);
}


/* PLACEHOLDER */

.search-input::placeholder{

    color:#cbd5e1;
}


/* BUTTON */

.btn{

    min-width:110px;

    height:54px;

    border:none;

    border-radius:16px;

    background:linear-gradient(to right,#2563eb,#7c3aed);

    color:white;

    cursor:pointer;

    font-weight:700;

    font-size:15px;

    transition:0.3s;
}

.btn:hover{

    transform:translateY(-3px);

    box-shadow:0 10px 25px rgba(37,99,235,0.35);
}
.search-input::placeholder{

    color:#777;
}

/* BUTTON */

.btn{

    padding:15px 24px;

    border:none;

    border-radius:18px;

    background:linear-gradient(to right,#2563eb,#7c3aed);

    color:white;

    cursor:pointer;

    font-weight:700;

    transition:0.3s;
}

.btn:hover{

    transform:translateY(-4px);

    box-shadow:0 10px 25px rgba(37,99,235,0.35);
}


/* FAVORITE */

.favorite-link,
.nearby-places{

    display:inline-flex;

    align-items:center;

    gap:8px;

    padding:15px 22px;

    border-radius:18px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    color:white;

    text-decoration:none;

    font-weight:700;

    transition:0.3s;

    border:1px solid rgba(255,255,255,0.08);
}

.favorite-link:hover,
.nearby-places:hover{

    transform:translateY(-4px);

    background:#2563eb;
}


/* CATEGORIES */

.categories{

    display:flex;

    gap:12px;

    overflow-x:auto;

    margin-bottom:35px;

    padding-bottom:10px;
}

.category-btn{

    padding:12px 22px;

    border:none;

    border-radius:999px;

    background:rgba(255,255,255,0.08);

    color:white;

    cursor:pointer;

    font-weight:600;

    white-space:nowrap;

    backdrop-filter:blur(10px);

    transition:0.3s;
}

.category-btn:hover{

    background:#2563eb;

    transform:translateY(-3px);
}


/* PLACES GRID */

.places{

    display:grid;

    grid-template-columns:
    repeat(auto-fill,minmax(330px,1fr));

    gap:30px;
}


/* CARD */

.card{

    background:rgba(255,255,255,0.08);

    border-radius:28px;

    overflow:hidden;

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.08);

    transition:0.4s;

    cursor:pointer;
}

.card:hover{

    transform:translateY(-10px);

    box-shadow:0 20px 40px rgba(0,0,0,0.35);
}


/* IMAGE */

.card-image{

    width:100%;

    height:240px;

    object-fit:cover;
}


/* BODY */

.card-body{

    padding:22px;
}


/* TITLE */

.card-title{

    font-size:28px;

    font-weight:800;

    margin-bottom:14px;

    color:white;
}


/* DESCRIPTION */

.card-description{

    color:#cbd5e1;

    line-height:1.7;

    margin-bottom:16px;
}


/* INFO */

.card-info{

    margin-bottom:10px;

    font-size:15px;

    color:#e2e8f0;
}


/* MAP BUTTON */

.map-link{

    display:inline-block;

    margin-top:14px;

    padding:12px 18px;

    border-radius:14px;

    text-decoration:none;

    background:linear-gradient(to right,#2563eb,#7c3aed);

    color:white;

    font-weight:700;

    transition:0.3s;
}

.map-link:hover{

    transform:translateY(-3px);
}


/* ERROR */

.error-box{

    display:none;

    margin-bottom:20px;

    padding:16px;

    border-radius:16px;

    background:#7f1d1d;

    color:white;
}


/* RESPONSIVE */

@media(max-width:768px){

    .title{

        font-size:38px;
    }

    .topbar-header{

        flex-direction:column;

        align-items:flex-start;

        gap:15px;
    }

    .topbar{

        flex-direction:column;
    }

    .btn,
    .search-input,
    .favorite-link,
    .nearby-places{

        width:100%;
    }
}
    </style>
</head>
<body>
    <div class="topbar topbar-header">

    <h1 class="title">

        İstanbul Mekanları

    </h1>


    <div class="header-actions">

        <a href="./favorite_places.html"
           class="favorite-link">

            Favoriler

        </a>


        <a href="./nearby_places.html"
           class="nearby-places">

            Sana Yakın Yerler

        </a>

    </div>

     </div>
        <div id="errorBox" class="error-box"></div>
        <div class="topbar">
            <input type="text" id="searchInput" class="search-input" placeholder="Mekan ara..."/>
            <button id="searchBtn" class="btn">
                Ara
            </button>
            <button id="allBtn" class="btn">
                Tümü
            </button>
        </div>
        <div id="categories" class="categories"></div>
        <div id="places" class="places"></div>
    </div>

    <script type="module">
        import {
            getCategories,
            getAllPlaces,
            getPlacesByCategory,
            searchPlace
        } from "../scripts/api.js";

        const categoriesContainer = document.getElementById("categories");
        const placesContainer = document.getElementById("places");
        const errorBox = document.getElementById("errorBox");
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");
        const allBtn = document.getElementById("allBtn");

        /* =========================
           UI
        ========================= */

        function showError(message) {
            errorBox.style.display = "block";
            errorBox.textContent = message;

            setTimeout(() => {
                errorBox.style.display = "none";
            }, 3000);
        }
        /* =========================
           RENDER PLACES
        ========================= */
        function renderPlaces(places) {

            placesContainer.innerHTML = "";

            if (!places.length) {
                placesContainer.innerHTML = `
                    <h2>Mekan bulunamadı</h2>
                `;
                return;
            }
            places.forEach(place => {

                const card = document.createElement("div");

                card.className = "card";

                card.addEventListener("click", () => {
                    window.location.href = `place.html?id=${place.id}`;
                });
                card.innerHTML = `
                    <img src="http://127.0.0.1:8000/${place.image_path}" alt="${place.title}" class="card-image" onerror="this.src='https://placehold.co/600x400'"/>
                    <div class="card-body">
                        <h2 class="card-title">
                            ${place.title}
                        </h2>
                        <p class="card-description">
                            ${place.description}
                        </p>
                        <p class="card-info">
                            <strong>Adres:</strong>
                            ${place.address}
                        </p>
                        <p class="card-info">
                            <strong>Fiyat:</strong>
                            ${place.price}
                        </p>
                        <a href="${place.link}" target="_blank" class="map-link">
                            Haritada Aç
                        </a>
                    </div>
                `;
                placesContainer.appendChild(card);
            });
        }
        /* =========================
           LOAD CATEGORIES
        ========================= */
        async function loadCategories() {
            try {
                const categories = await getCategories();
                categoriesContainer.innerHTML = "";
                categories.forEach(category => {
                    const button = document.createElement("button");
                    button.className = "category-btn";
                    button.textContent = category.title;
                    button.addEventListener("click", async () => {
                        try {
                            const places = await getPlacesByCategory(category.id);
                            renderPlaces(places);
                        } catch (error) {
                            console.error(error);
                            showError("Kategori yüklenemedi");
                        }
                    });
                    categoriesContainer.appendChild(button);
                });
            } catch (error) {
                console.error(error);
                showError("Kategoriler alınamadı");
            }
        }
        /* =========================
           LOAD ALL PLACES
        ========================= */
        async function loadAllPlaces() {
            try {
                const places = await getAllPlaces();
                renderPlaces(places);
            } catch (error) {
                console.error(error);
                showError("Mekanlar alınamadı");
            }
        }
        /* =========================
           SEARCH
        ========================= */
        async function handleSearch() {
            const title = searchInput.value.trim();
            if (!title) {
                return loadAllPlaces();
            }
            try {
                const result = await searchPlace(title);
                renderPlaces(result);
            } catch (error) {
                console.error(error);
                showError("Arama başarısız");
            }
        }
        searchBtn.addEventListener("click", handleSearch);
        searchInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                handleSearch();
            }
        });
        allBtn.addEventListener("click", loadAllPlaces);
        /* =========================
           INIT
        ========================= */
        loadCategories();
        loadAllPlaces();
    </script>

</body>
</html>
