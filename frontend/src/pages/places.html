<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Istanbul Explorer</title>

    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: #f5f5f5;
        overflow-y: scroll;
        color: #111;
      }

      /* SCROLLBAR */

      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-track {
        background: #ececec;
      }

      ::-webkit-scrollbar-thumb {
        background: #111;
        border-radius: 20px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #ff4d7a;
      }

      /* NAVBAR */

      .navbar {
        width: 100%;
        height: 80px;

        background: white;

        display: flex;
        align-items: center;
        justify-content: space-between;

        padding: 0 35px;

        border-bottom: 1px solid #e4e4e4;

        position: sticky;
        top: 0;
        z-index: 999;
      }

      /* LOGO */

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;

        font-size: 28px;
        font-weight: 800;
      }

      .logo-icon {
        width: 48px;
        height: 48px;

        border-radius: 14px;

        background: #ff4d7a;

        display: flex;
        align-items: center;
        justify-content: center;

        color: white;
      }

      /* SEARCH */

      .search-box {
        width: 180px;
        height: 38px;

        background: #f2f2f2;

        border-radius: 30px;

        display: flex;
        align-items: center;
        gap: 8px;

        padding: 0 14px;
      }

      .search-box input {
        width: 100%;

        border: none;
        background: transparent;
        outline: none;

        font-size: 13px;
      }

      /* CONTAINER */

      .container {
        width: 100%;
        padding: 35px;
      }

      /* HERO */

      .hero {
        margin-bottom: 40px;
      }

      .hero h1 {
        font-size: 58px;
        font-weight: 800;

        margin-bottom: 10px;
      }

      .hero p {
        font-size: 19px;
        color: #666;
      }

      /* CATEGORY GRID */

      .categories-grid {
        width: 100%;

        display: grid;

        grid-template-columns: repeat(3, 1fr);

        gap: 25px;

        margin-bottom: 50px;
      }

      /* CATEGORY CARD */

      .category-card {
        position: relative;

        height: 260px;

        border-radius: 30px;

        overflow: hidden;

        cursor: pointer;

        transition: 0.4s;
      }

      .category-card:hover {
        transform: translateY(-8px) scale(1.02);
      }

      .category-card img {
        width: 100%;
        height: 100%;

        object-fit: cover;
      }

      /* OVERLAY */

      .overlay {
        position: absolute;

        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        background: rgba(0, 0, 0, 0.35);
      }

      /* CATEGORY TITLE */

      .category-card h2 {
        position: absolute;

        bottom: 25px;
        left: 25px;

        color: white;

        font-size: 34px;
        font-weight: 800;

        z-index: 2;
      }

      /* PLACE CARDS */

      .cards {
        display: grid;

        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));

        gap: 30px;
      }

      /* CARD */

      .card {
        background: white;

        border-radius: 30px;

        overflow: hidden;

        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);

        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-6px);
      }

      /* IMAGE */

      .card-image {
        width: 100%;
        height: 240px;

        position: relative;
      }

      .card-image img {
        width: 100%;
        height: 100%;

        object-fit: cover;
      }

      /* TAG */

      .tag {
        position: absolute;

        top: 16px;
        left: 16px;

        background: rgba(0, 0, 0, 0.7);

        color: white;

        padding: 8px 14px;

        border-radius: 20px;

        font-size: 12px;
        font-weight: 700;
      }

      /* PRICE */

      .price {
        position: absolute;

        top: 16px;
        right: 16px;

        background: white;

        padding: 8px 14px;

        border-radius: 20px;

        font-size: 12px;
        font-weight: 700;
      }

      /* SAVE */

      .save-btn {
        position: absolute;

        bottom: 16px;
        right: 16px;

        width: 48px;
        height: 48px;

        border: none;

        border-radius: 50%;

        background: rgba(255, 255, 255, 0.9);

        cursor: pointer;

        font-size: 18px;
      }

      /* CONTENT */

      .card-content {
        padding: 22px;
      }

      .location {
        color: #ff4d7a;

        font-size: 13px;
        font-weight: 700;

        margin-bottom: 10px;
      }

      .card-title {
        font-size: 28px;
        font-weight: 800;

        margin-bottom: 10px;
      }

      .description {
        color: #666;
        line-height: 1.7;
      }

      /* FOOTER */

      .card-footer {
        margin-top: 22px;

        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .go-btn {
        width: 50px;
        height: 50px;

        border: none;
        border-radius: 50%;

        background: #f1f1f1;

        cursor: pointer;

        font-size: 20px;
      }

      /* RESPONSIVE */

      @media (max-width: 900px) {
        .categories-grid {
          grid-template-columns: 1fr;
        }

        .cards {
          grid-template-columns: 1fr;
        }

        .hero h1 {
          font-size: 42px;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->

    <nav class="navbar">
      <div class="logo">
        <div class="logo-icon">📍</div>
        Istanbul Explorer
      </div>

      <div class="search-box">
        🔍
        <input type="text" id="searchInput" placeholder="Ara..." />
      </div>
    </nav>

    <!-- CONTAINER -->

    <div class="container">
      <div class="hero">
        <h1>İstanbul Explorer 👋</h1>

        <p>İstanbul’daki en popüler keşif noktaları</p>
      </div>

      <!-- CATEGORY CARDS -->

      <div class="categories-grid">
        <div class="category-card">
          <img
            src="https://images.unsplash.com/photo-1541432901042-2d8bd64b4a9b?q=80&w=1200&auto=format&fit=crop"
          />

          <div class="overlay"></div>

          <h2>Camiler</h2>
        </div>

        <div class="category-card">
          <img
            src="https://images.unsplash.com/photo-1544735716-392fe2489ffa?q=80&w=1200&auto=format&fit=crop"
          />

          <div class="overlay"></div>

          <h2>Saraylar</h2>
        </div>

        <div class="category-card">
          <img
            src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1200&auto=format&fit=crop"
          />

          <div class="overlay"></div>

          <h2>Yemek</h2>
        </div>

        <div class="category-card">
          <img
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop"
          />

          <div class="overlay"></div>

          <h2>Köşkler</h2>
        </div>

        <div class="category-card">
          <img
            src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop"
          />

          <div class="overlay"></div>

          <h2>Manzaralı Yerler</h2>
        </div>

        <div class="category-card">
          <img
            src="https://images.unsplash.com/photo-1524231757912-21f4fe3a7200?q=80&w=1200&auto=format&fit=crop"
          />

          <div class="overlay"></div>

          <h2>Boğaz</h2>
        </div>
      </div>

      <!-- PLACE CARDS -->

      <div class="cards" id="cards"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
