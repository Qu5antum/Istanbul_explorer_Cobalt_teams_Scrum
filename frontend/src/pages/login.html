<!DOCTYPE html>
<html lang="tr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Giriş Yap</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="form-container">

    <!-- LOGO -->

    <div class="logo">

      İstanbul Explorer

    </div>


    <!-- TITLE -->

    <h2>Giriş Yap</h2>


    <!-- FORM -->

    <form id="loginForm">

      <input type="email"
             id="email"
             placeholder="Email">

      <input type="password"
             id="password"
             placeholder="Şifre">


      <button type="submit">

        Giriş Yap

      </button>

    </form>


    <!-- REGISTER -->

    <p>

      Hesabın yok mu?

      <a href="register.html">

        Kayıt Ol

      </a>

    </p>

  </div>


  <!-- JS -->

  <script>

    const form =
      document.getElementById("loginForm");

    form.addEventListener("submit",(e)=>{

      e.preventDefault();

      const email =
        document.getElementById("email").value;

      const password =
        document.getElementById("password").value;


      if(email === "" || password === ""){

        alert("Lütfen tüm alanları doldurun");

      }else{

        alert("Giriş başarılı");

        window.location.href = "index.html";
      }

    });

  </script>

</body>

</html>
