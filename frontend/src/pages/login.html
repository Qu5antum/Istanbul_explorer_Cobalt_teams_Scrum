<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Giriş Yap</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="form-container">

        <h2>Giriş Yap</h2>

        <form id="loginForm">

            <input type="text"
                   id="email"
                   placeholder="Email">

            <input type="password"
                   id="password"
                   placeholder="Şifre">

            <button type="submit">
                Giriş Yap
            </button>

        </form>

        <p>

            Hesabın yok mu?

            <a href="register.html">
                Kayıt Ol
            </a>

        </p>

    </div>


    <!-- JS DOSYASI -->

    <script type="module"
            src="login.js"></script>

</body>

</html>
