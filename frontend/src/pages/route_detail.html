<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Route Detail</title>
    <!-- LEAFLET -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css"/>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter,Arial,sans-serif;
        }
        body{
            background:#0f172a;
            color:white;
            padding:40px;
            overflow-x:hidden;
            background-image:
            radial-gradient(circle at top left,#2563eb33,transparent 25%),
            radial-gradient(circle at bottom right,#7c3aed33,transparent 25%);
        }
        .container{
            max-width:1400px;
            margin:auto;
        }
        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:30px;
            gap:20px;
            flex-wrap:wrap;
        }
        .title{
            font-size:48px;
            font-weight:800;
            background:linear-gradient(to right,#60a5fa,#c084fc);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .back-btn{
            padding:14px 22px;
            border-radius:16px;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
            color:white;
            text-decoration:none;
            font-weight:700;
            border:1px solid rgba(255,255,255,0.08);
            transition:0.3s;
        }
        .back-btn:hover{
            background:#2563eb;
            transform:translateY(-4px);
        }
        #map{
            width:100%;
            height:500px;
            border-radius:28px;
            overflow:hidden;
            margin-bottom:40px;
            border:1px solid rgba(255,255,255,0.08);
            box-shadow:0 20px 40px rgba(0,0,0,0.35);
        }
        .timeline{
            display:flex;
            flex-direction:column;
            gap:24px;
        }
        .timeline-card{
            background:rgba(255,255,255,0.08);
            border-radius:24px;
            padding:24px;
            backdrop-filter:blur(14px);
            border:1px solid rgba(255,255,255,0.08);
            transition:0.3s;
        }
        .timeline-card:hover{
            transform:translateY(-6px);
            box-shadow:0 20px 40px rgba(0,0,0,0.35);
        }
        .order{
            width:42px;
            height:42px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(to right,#2563eb,#7c3aed);
            font-weight:800;
            margin-bottom:18px;
        }
        .place-title{
            font-size:30px;
            font-weight:800;
            margin-bottom:16px;
        }
        .info{
            color:#cbd5e1;
            margin-bottom:10px;
            line-height:1.6;
        }
        .travel{
            margin-top:16px;
            color:#93c5fd;
            font-weight:700;
        }
        .loading{
            text-align:center;
            font-size:28px;
            margin-top:100px;
            color:#cbd5e1;
        }
        @media(max-width:768px){
            body{
                padding:20px;
            }
            .title{
                font-size:36px;
            }
            #map{
                height:350px;
            }
            .place-title{
                font-size:24px;
            }
        }
        .delete-btn{
            padding:14px 22px;
            border:none;
            border-radius:16px;
            background:#ef4444;
            color:white;
            font-weight:700;
            cursor:pointer;
            transition:0.3s;
        }
        .delete-btn:hover{
            background:#dc2626;
            transform:translateY(-4px);
        }
        .place-btn{
            display:inline-block;
            margin-top:18px;
            padding:12px 18px;
            border-radius:14px;
            background:linear-gradient(to right,#2563eb,#7c3aed);
            color:white;
            text-decoration:none;
            font-weight:700;
            transition:0.3s;
        }
        .place-btn:hover{
            transform:translateY(-4px);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <h1 class="title">
            Route Detail
        </h1>
        <div style="display:flex; gap:14px; flex-wrap:wrap;">
            <button id="deleteRouteBtn" class="delete-btn">
                Route Sil
            </button>
            <a href="./routes.html" class="back-btn">
                Geri Dön
            </a>
        </div>
    </div>
    <div id="map"></div>
    <div id="timeline" class="timeline"></div>
</div>

<script type="module">

    import {
        getRoutePlaces,
        deleteRoute
    } from "../scripts/api.js";

    const params = new URLSearchParams(
        window.location.search
    );
    const routeId = params.get("id");
    const colors = [
        "#2563eb",
        "#7c3aed",
        "#10b981",
        "#f59e0b",
        "#ef4444",
        "#06b6d4"
    ];

    const deleteRouteBtn = document.getElementById("deleteRouteBtn");
    const timeline = document.getElementById("timeline");
    let map;

    deleteRouteBtn.addEventListener(
        "click",
        async () => {
            const confirmed = confirm(
                "Bu route silinsin mi?"
            );
            if (!confirmed) {
                return;
            }
            try {
                await deleteRoute(routeId);
                alert("Route silindi");
                window.location.href = "./routes.html";
            } catch (error) {
                console.error(error);
                alert("Route silinemedi");
            }
        }
    );

    async function loadRouteDetail() {
        try {
            const routePlaces = await getRoutePlaces(routeId);
            renderTimeline(routePlaces);
            initializeMap(routePlaces);
        } catch (error) {
            console.error(error);
            timeline.innerHTML = `
                <h2 class="loading">
                    Route yüklenemedi
                </h2>
            `;
        }
    }

    function renderTimeline(routePlaces) {
        timeline.innerHTML = "";
        routePlaces.forEach(item => {
            const place = item.place;
            const card = document.createElement("div");

            card.className = "timeline-card";

            card.innerHTML = `

                <div class="order">
                    ${item.order_number}
                </div>

                <img
                    src="http://127.0.0.1:8000/${place.image_path}"
                    alt="${place.title}"
                    style="
                        width:100%;
                        height:240px;
                        object-fit:cover;
                        border-radius:20px;
                        margin-bottom:20px;
                    "
                />

                <h2 class="place-title">
                    ${place.title}
                </h2>

                <p class="info">
                    ${place.description}
                </p>

                <p class="info">
                    <strong>Fiyat:</strong>
                    ${place.price}
                </p>

                <p class="info">
                    <strong>Adres:</strong>
                    ${place.address}
                </p>

                <p class="info">
                    <strong>Varış:</strong>
                    ${formatDate(item.arrival_time)}
                </p>

                <p class="info">
                    <strong>Ayrılış:</strong>
                    ${formatDate(item.departure_time)}
                </p>

                <p class="info">
                    <strong>Ziyaret Süresi:</strong>
                    ${item.visit_duration} dk
                </p>

                <p class="travel">
                    Yolculuk Süresi:
                    ${item.travel_duration} dk
                </p>

                <a
                    href="${place.link}"
                    target="_blank"
                    class="place-btn"
                >
                    Google Maps
                </a>
            `;

            timeline.appendChild(card);
        });
    }

    function initializeMap(routePlaces) {
        if (!routePlaces.length) {
            return;
        }

        const firstPlace =
            routePlaces[0].place;

        map = L.map("map").setView(
            [
                firstPlace.latitude,
                firstPlace.longitude
            ],
            13
        );

        L.tileLayer(
            "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            {
                attribution:
                    "&copy; OpenStreetMap contributors"
            }
        ).addTo(map);

        const latlngs = [];

        routePlaces.forEach((item) => {
            const place = item.place;
            const latlng = [
                place.latitude,
                place.longitude
            ];

            latlngs.push(latlng);

            const popupContent = `

                <div style="min-width:220px;">

                    <img
                        src="http://127.0.0.1:8000/${place.image_path}"
                        style="
                            width:100%;
                            height:120px;
                            object-fit:cover;
                            border-radius:12px;
                            margin-bottom:10px;
                        "
                    />

                    <h3 style="margin-bottom:8px;">
                        ${item.order_number}.
                        ${place.title}
                    </h3>

                    <p>
                        ⏰ ${formatDate(item.arrival_time)}
                    </p>

                    <p>
                        🚶 ${item.travel_duration} dk
                    </p>

                    <a
                        href="${place.link}"
                        target="_blank"
                        style="
                            display:inline-block;
                            margin-top:10px;
                            color:#2563eb;
                            font-weight:bold;
                        "
                    >
                        Google Maps
                    </a>
                </div>
            `;
            L.marker(latlng).addTo(map).bindPopup(popupContent);
        });
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;
                const userLatLng = [
                    userLat,
                    userLng
                ];
                L.marker(userLatLng)
                    .addTo(map)
                    .bindPopup("Başlangıç Noktası")
                    .openPopup();

                const allPoints = [
                    userLatLng,
                    ...latlngs
                ];
                drawRoutes(allPoints);
            },
            (error) => {
                console.error(error);
                drawRoutes(latlngs);
            }
        );
    }
    function drawRoutes(points) {
        for (let i = 0; i < points.length - 1; i++) {
            const start = points[i];
            const end = points[i + 1];
            L.Routing.control({
                router: L.Routing.osrmv1({
                    serviceUrl:
                        "https://router.project-osrm.org/route/v1",

                    profile: "foot"
                }),
                waypoints: [
                    L.latLng(start[0], start[1]),
                    L.latLng(end[0], end[1])
                ],
                routeWhileDragging: false,
                addWaypoints: false,
                draggableWaypoints: false,
                fitSelectedRoutes: i === 0,
                show: false,
                lineOptions: {
                    styles: [
                        {
                            color:
                                colors[
                                    i % colors.length
                                ],
                            weight: 6,
                            opacity: 0.9
                        }
                    ]
                },
                createMarker: () => null
            }).addTo(map);
        }
    }
    function formatDate(dateString) {
        return new Date(
            dateString
        ).toLocaleString("tr-TR");
    }
    loadRouteDetail();
</script>
</body>
</html>
