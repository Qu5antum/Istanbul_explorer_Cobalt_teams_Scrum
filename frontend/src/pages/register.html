<!DOCTYPE html>
<html lang="tr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Kayıt Ol</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

<div class="form-container">



  <div class="logo">

    İstanbul Explorer

  </div>


  

  <h2>Kayıt Ol</h2>


  <!-- FORM -->

  <form id="registerForm">

    <input type="text"
           id="username"
           placeholder="Kullanıcı Adı">

    <input type="email"
           id="email"
           placeholder="Email">

    <input type="password"
           id="password"
           placeholder="Şifre">


    <button type="submit">

      Kayıt Ol

    </button>

  </form>


  <!-- LOGIN -->

  <p>

    Zaten hesabın var mı?

    <a href="login.html">

      Giriş Yap

    </a>

  </p>

</div>


<script>

  const form =
    document.getElementById("registerForm");


  form.addEventListener("submit",(e)=>{

    e.preventDefault();

    const username =
      document.getElementById("username").value;

    const email =
      document.getElementById("email").value;

    const password =
      document.getElementById("password").value;


    if(
      username === "" ||
      email === "" ||
      password === ""
    ){

      alert("Lütfen tüm alanları doldurun");

    }else{

      alert("Kayıt başarılı");

      window.location.href = "login.html";
    }

  });

</script>

</body>

</html>
