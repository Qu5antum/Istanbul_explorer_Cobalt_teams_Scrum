<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol</title>
    <link rel="stylesheet"href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Kayıt Ol</h2>
        <form id="registerForm">
            <input
                id="email"
                type="email"
                placeholder="Email"
                required
            >
            <input
                id="phone"
                type="text"
                placeholder="Telefon numarası"
                required
            >
            <input
                id="password"
                type="password"
                placeholder="Şifre"
                required
            >
            <button type="submit">
                Kayıt Ol
            </button>
        </form>
        <p>
            Zaten hesabın var mı?
            <a href="login.html">
                Giriş Yap
            </a>
        </p>
    </div>
    <script type="module" src="../scripts/auth.js"></script>
</body>
</html>
