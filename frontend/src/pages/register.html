<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Kayıt Ol</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="form-container">

        <h2>Kayıt Ol</h2>

        <form id="registerForm">

            <input type="text"
                   id="email"
                   placeholder="Email">

            <input type="phone number"
                   id="phone"
                   placeholder="Telefon Numara">

            <input type="password"
                   id="password"
                   placeholder="Şifre">

            <button type="submit">
                Kayıt Ol
            </button>

        </form>

        <p>

            Zaten hesabın var mı?

            <a href="login.html">
                Giriş Yap
            </a>

        </p>

    </div>


    <!-- JS DOSYASI -->

    <script type="module"
            src="register.js"></script>

</body>

</html>
